name: tchadopportunite
description: TchadOpportunité - Plateforme numérique de recrutement et services au Tchad
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.3

  # Network
  dio: ^5.4.2+1
  pretty_dio_logger: ^1.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI & Design
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # Real-time
  socket_io_client: ^2.0.3+1

  # Maps
  google_maps_flutter: ^2.6.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.2.2
  image_cropper: ^8.0.2
  file_picker: ^8.1.4
  photo_view: ^0.15.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.6
  share_plus: ^11.0.0
  timeago: ^3.6.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.4.0
  connectivity_plus: ^6.1.4
  package_info_plus: ^8.1.3
  permission_handler: ^11.3.1

  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Charts
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Badges
  badges: ^3.1.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
